services:
  - type: web
    name: researchmind-api
    runtime: python
    rootDir: researchmind
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000
      - key: SERPER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
